trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release
  dotnetVersion: '10.x'
  nodeVersion: '22.x'
  projectDir: 'BggGrids'
  clientDir: 'BggGrids/ClientApp'

stages:

# ── Stage 1: Build ────────────────────────────────────────────────────────────

  - stage: Build
    displayName: Build
    jobs:
      - job: BuildJob
        displayName: Build React + .NET

        steps:

          # Node / React ────────────────────────────────────────────────────────
          - task: NodeTool@0
            displayName: Use Node $(nodeVersion)
            inputs:
              versionSpec: $(nodeVersion)

          - script: npm ci
            workingDirectory: $(clientDir)
            displayName: npm ci

          - script: npm run build
            workingDirectory: $(clientDir)
            displayName: npm run build

          # .NET ────────────────────────────────────────────────────────────────
          - task: UseDotNet@2
            displayName: Use .NET $(dotnetVersion)
            inputs:
              version: $(dotnetVersion)
              includePreviewVersions: true   # required for .NET 10 until GA

          - task: DotNetCoreCLI@2
            displayName: dotnet publish
            inputs:
              command: publish
              publishWebProjects: false
              projects: '$(projectDir)/*.csproj'
              arguments: >
                --configuration $(buildConfiguration)
                --output $(Build.ArtifactStagingDirectory)/publish
                /p:SpaRoot=ClientApp/
              zipAfterPublish: false
              modifyOutputPath: false

          # Copy the pre-built Vite dist into the publish folder so the single
          # archive contains both the .NET output and the SPA assets.
          - task: CopyFiles@2
            displayName: Copy React dist into publish
            inputs:
              SourceFolder: $(clientDir)/dist
              Contents: '**'
              TargetFolder: $(Build.ArtifactStagingDirectory)/publish/ClientApp/dist

          # Pack everything into one zip ────────────────────────────────────────
          - task: ArchiveFiles@2
            displayName: Create deployment archive
            inputs:
              rootFolderOrFile: $(Build.ArtifactStagingDirectory)/publish
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/drop/bgg.zip
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: Publish artifact
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)/drop
              ArtifactName: drop
              publishLocation: Container

# ── Stage 2: Deploy ───────────────────────────────────────────────────────────

  - stage: Deploy
    displayName: Deploy to Azure Web App
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployWebApp
        displayName: Deploy bgg
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: Deploy to Azure Web App
                  inputs:
                    azureSubscription: 'xbl'
                    appType: webApp
                    appName: bgg
                    package: $(Pipeline.Workspace)/drop/bgg.zip
                    deploymentMethod: zipDeploy

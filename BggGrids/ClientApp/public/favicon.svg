<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#1a1b1e"/>
  <!-- Dice face border -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="#228be6"/>
  <!-- Dice face inner -->
  <rect x="3.5" y="3.5" width="25" height="25" rx="5" fill="#1c7ed6"/>
  <!-- Pips: standard 5-face layout -->
  <!-- top-left -->
  <circle cx="10" cy="10" r="2.8" fill="#e9ecef"/>
  <!-- top-right -->
  <circle cx="22" cy="10" r="2.8" fill="#e9ecef"/>
  <!-- center -->
  <circle cx="16" cy="16" r="2.8" fill="#e9ecef"/>
  <!-- bottom-left -->
  <circle cx="10" cy="22" r="2.8" fill="#e9ecef"/>
  <!-- bottom-right -->
  <circle cx="22" cy="22" r="2.8" fill="#e9ecef"/>
</svg>
